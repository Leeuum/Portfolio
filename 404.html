<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Page Not Found | Liam Roder Portfolio</title>
  <link rel="stylesheet" href="style.css">
  <script>
  (() => {
    const saved = localStorage.getItem('theme');
    const prefers = window.matchMedia('(prefers-color-scheme: dark)').matches;
    if ((saved ?? (prefers ? 'dark' : 'light')) === 'dark') {
      document.documentElement.classList.add('dark-mode');
    }
  })();
  </script>
</head>
<body>
  <button id="theme-toggle" class="theme-toggle" type="button" aria-label="Toggle dark mode" aria-pressed="false" title="Toggle dark mode">
    <svg class="theme-icon icon-sun" viewBox="0 0 24 24" aria-hidden="true" focusable="false">
      <circle cx="12" cy="12" r="4.2"></circle>
      <path d="M12 2.2v2.4M12 19.4v2.4M2.2 12h2.4M19.4 12h2.4M5.1 5.1l1.7 1.7M17.2 17.2l1.7 1.7M18.9 5.1l-1.7 1.7M6.8 17.2l-1.7 1.7"></path>
    </svg>
    <svg class="theme-icon icon-moon" viewBox="0 0 24 24" aria-hidden="true" focusable="false">
      <path d="M20.7 13.4A8.6 8.6 0 1 1 10.6 3.3a6.8 6.8 0 0 0 10.1 10.1z"></path>
    </svg>
  </button>
  <h1>404 - Page Not Found</h1>
  <p>The page you're looking for doesn't exist.</p>

    </address>
    <p>&copy; <script>document.write(new Date().getFullYear())</script> Liam Roder</p>
  </footer>
  <script defer src="theme.js"></script>
</body>
</html>
